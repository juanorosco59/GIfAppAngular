<div class="card bg-base-100 shadow-sm animate-fade-in">
  <figure>
    <img
      [src]="imgProduct()"
      alt="Shoes" />
  </figure>
  <div class="card-body">
    <h2 class="card-title">{{ imgTitle() }}</h2>
    <h3 class="caret-emerald-500 text-orange-700 text-accent">{{ imgGender() }}</h3>
    <p>{{ imgDescription() }}</p>
    <div class="card-actions justify-end">
      <!-- <button class="btn btn-primary">Buy Now</button> -->
       <a class="link-accent" [routerLink]="['/product', imgSlug()]">View details</a>
    </div>
  </div>
</div>
<section>
</section>
