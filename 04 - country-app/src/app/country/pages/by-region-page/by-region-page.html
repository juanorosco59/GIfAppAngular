<h1 class="text-2xl">Por región</h1>
<h3 class="text-lg">Seleccione una región</h3>

<section class="row mt-2">
    <div class="flex-col"></div>

    @for(region of regions; track $index){

    <button class="btn btn-outline mr-2 w-25" (click)="selectRegion(region)"

        [class.btn-primary]="selectedRegion() === region"
                
        
        >{{region.valueOf()}}</button>


    }


</section>


<country-list [countries]="countryResource.value() ?? []" [customErrorMessage]="countryResource.error()"
    [isEmpty]="countryResource.value()?.length === 0" [isLoading]="countryResource.isLoading()"
    [isGotValue]="countryResource.hasValue()"></country-list>
