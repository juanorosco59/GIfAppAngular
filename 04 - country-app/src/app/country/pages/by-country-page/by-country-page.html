<country-search-input placeholder="Buscar por nombre de país" (custom_value)="query.set($event)"></country-search-input>

<country-list 

[countries]="countryResource.value() ?? []"
[customErrorMessage]="countryResource.error()"
[isEmpty]="countryResource.value()?.length === 0"
[isLoading]="countryResource.isLoading()"
[isGotValue]="countryResource.hasValue()"

></country-list>
